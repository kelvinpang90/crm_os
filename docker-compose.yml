networks:
  proxy_net:
    external: true
    name: proxy_net          # nginx 所在网络
  data_net:
    external: true
    name: data_net           # mysql / redis 所在网络

services:
  backend:
    image: ghcr.io/kelvin/crm_os-backend:latest
    build: ./backend         # 本地 docker compose build 时用；CI 构建后忽略
    env_file: .env
    environment:
      - INSTANCE_ID=backend
      - DB_HOST=infra_mysql
      - REDIS_URL=redis://infra_redis:6379/0
    networks: [proxy_net, data_net]
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: ghcr.io/kelvin/crm_os-frontend:latest
    build: ./frontend
    networks: [proxy_net]
    restart: unless-stopped
