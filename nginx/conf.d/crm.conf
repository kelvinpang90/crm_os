# NOTE: This file is THE production nginx config. After deploy, run on VPS:
#   sudo cp /opt/crm_os/nginx/conf.d/crm.conf /srv/infra/nginx/conf.d/crm.conf
#   sudo docker exec infra_nginx nginx -t && sudo docker exec infra_nginx nginx -s reload
# Upstream hostnames use full container names to avoid DNS collisions with
# other compose projects on the shared proxy_net (e.g. erp_frontend / erp_backend).

upstream crm_backend {
    server crm_os-backend-1:8000 max_fails=2 fail_timeout=10s;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name crm.kelvinpeng.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name crm.kelvinpeng.com;

    ssl_certificate     /etc/nginx/certs/_wildcard.kelvinpeng.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/_wildcard.kelvinpeng.com/privkey.pem;

    client_max_body_size 20M;

    # ---- Legal pages required by Meta App publish review ----
    location = /privacy {
        default_type text/plain;
        return 200 "CRM OS - Privacy Policy\n\nThis application is an internal CRM used by our sales team to manage customer relationships. We collect and store the following customer data: name, phone number, email address, message history (including WhatsApp messages exchanged with our team), and sales activity records. Data is stored solely for sales follow-up and customer service. We do not sell or share data with third parties. WhatsApp messages are received via the Meta WhatsApp Business Cloud API and stored in our database. To request access to or deletion of your personal data, contact: contact@kelvinpeng.com.\n\nLast updated: 2026-05-14\n";
    }

    location = /terms {
        default_type text/plain;
        return 200 "CRM OS - Terms of Service\n\nThis application is for internal business use by our sales team. Access is restricted to authorized employees. By using this service you agree that customer data will be handled in accordance with our Privacy Policy at https://crm.kelvinpeng.com/privacy. For questions, contact: contact@kelvinpeng.com.\n\nLast updated: 2026-05-14\n";
    }

    location = /data-deletion {
        default_type text/plain;
        return 200 "CRM OS - Data Deletion Instructions\n\nTo request deletion of your personal data (including WhatsApp message history, contact records, and any associated activity logs) stored in our CRM, send an email to contact@kelvinpeng.com with the subject line 'Data Deletion Request' and include the phone number or email address you contacted us with. We will confirm deletion within 30 days.\n\nLast updated: 2026-05-14\n";
    }

    # ---- WhatsApp webhook (must precede generic /api/) ----
    location /api/webhooks/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Backend API ----
    location /api/ {
        proxy_pass http://crm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # ---- Health check ----
    location /health {
        proxy_pass http://crm_backend/api/health;
    }

    # ---- Frontend SPA (must be last; matches everything else) ----
    location / {
        proxy_pass http://crm_os-frontend-1:80;
        proxy_set_header Host $host;
    }
}
